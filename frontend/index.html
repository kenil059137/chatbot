<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHARUSAT Support AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #030305;
      --bg-surface: rgba(20, 20, 25, 0.6);
      --bg-surface-hover: rgba(30, 30, 38, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.15);
      --text: #f0f0f5;
      --text-muted: #9ea3b0;
      --text-dim: #6b7280;
      --primary: #818cf8;
      --primary-grad: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      --glow: rgba(139, 92, 246, 0.3);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.15);
      --font-main: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.08), transparent 25%);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      display: flex;
      background: var(--bg-surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.02);
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 15, 0.4);
    }

    .brand {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .logo-box {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--primary-grad);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px var(--glow);
    }
    .logo-box svg { width: 22px; height: 22px; fill: #fff; }

    .brand-text h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    .brand-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .new-chat-btn {
      margin: 20px 24px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s ease;
    }
    .new-chat-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
    .new-chat-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    .history {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }
    
    .history-title {
      padding: 0 12px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .history-item {
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      display: flex; flex-direction: column; gap: 4px;
    }
    .history-item:hover { background: var(--bg-surface-hover); }
    .history-item.active {
      background: rgba(139, 92, 246, 0.1);
      border-left-color: var(--primary);
    }
    .h-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-time { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 10px var(--success);
      position: relative;
    }
    .status-dot::after {
      content: ''; position: absolute; inset: -4px;
      border: 1px solid var(--success);
      border-radius: 50%;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }

    /* Main Chat Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10, 10, 15, 0.2);
    }

    .header-title h2 { font-size: 18px; font-weight: 500; }
    .session-badge {
      font-family: var(--font-mono); font-size: 12px;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(255, 255, 255, 0.05); color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .stats {
      display: flex; gap: 16px;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    }
    .stat-pill .val { font-family: var(--font-mono); color: var(--primary); }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex; flex-direction: column; gap: 24px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex; gap: 16px; max-width: 85%;
      animation: slideUp 0.3s ease-out forwards;
      opacity: 0; transform: translateY(10px);
    }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 600; font-size: 14px;
    }
    .bot .avatar { background: var(--primary-grad); color: #fff; box-shadow: 0 4px 12px var(--glow); }
    .user .avatar { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); }

    .msg-content { display: flex; flex-direction: column; gap: 6px; }
    .user .msg-content { align-items: flex-end; }

    .bubble {
      padding: 14px 18px;
      font-size: 15px; line-height: 1.6;
      border-radius: 18px;
      position: relative;
    }
    .bot .bubble {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .user .bubble {
      background: var(--primary-grad);
      color: #fff;
      border-top-right-radius: 4px;
      box-shadow: 0 4px 15px var(--glow);
    }

    .meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);
    }
    .conf-tag {
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
    }
    .conf-high { background: var(--success-bg); color: var(--success); }
    .conf-med { background: var(--warning-bg); color: var(--warning); }
    .conf-low { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .input-wrapper {
      padding: 24px 32px;
      background: linear-gradient(to top, var(--bg-surface) 50%, transparent);
    }

    .input-box {
      display: flex; align-items: flex-end; gap: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 10px 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-box:focus-within {
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    textarea {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-main); font-size: 15px;
      resize: none;
      padding: 8px 4px;
      min-height: 40px; max-height: 120px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--primary-grad); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px var(--glow); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Typing Animation */
    .typing .bubble { display: flex; gap: 4px; padding: 18px; }
    .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      </div>
      <div class="brand-text">
        <h1>CHARUSAT</h1>
        <p>Support Assistant</p>
      </div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Conversation
    </button>

    <div class="history-title">Recent Chats</div>
    <div class="history" id="history-list">
      <div class="history-item active">
        <div class="h-title">Welcome Session</div>
        <div class="h-time" id="h-time-justnow">just now</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="status">
        <div class="status-dot"></div>
        System Online
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main">
    <header class="header">
      <div class="header-title">
        <h2>Student Support</h2>
      </div>
      <div class="stats">
        <div class="stat-pill">
          <span>Msg</span>
          <span class="val" id="msg-count">0</span>
        </div>
        <div class="stat-pill">
          <span>Session</span>
          <span class="val" id="session-display">...</span>
        </div>
      </div>
    </header>

    <div class="chat-container" id="chat">
      <div class="message bot">
        <div class="avatar">AI</div>
        <div class="msg-content">
          <div class="bubble">Hello! I am the CHARUSAT AI Assistant. How can I help you with your academic support, administrative queries, or technical issues today?</div>
          <div class="meta"><span id="welcome-time">just now</span></div>
        </div>
      </div>
    </div>

    <div class="input-wrapper">
      <div class="input-box">
        <textarea id="input" placeholder="Type your message here..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
  const API_URL = 'http://127.0.0.1:8000/chat';
  let sessionId = generateSessionId();
  let msgCount = 0;

  document.getElementById('welcome-time').textContent = getTime();
  document.getElementById('h-time-justnow').textContent = getTime();
  document.getElementById('session-display').textContent = sessionId.substring(0,6);

  function generateSessionId() {
    return Math.random().toString(36).substr(2, 9);
  }

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function getConfClass(conf) {
    if (conf >= 0.6) return 'conf-high';
    if (conf >= 0.3) return 'conf-med';
    return 'conf-low';
  }

  function addMessage(text, role, conf = null) {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    
    let metaHtml = `<span>${getTime()}</span>`;
    if (role === 'bot' && conf !== null) {
      const pct = Math.round(conf * 100);
      metaHtml += `<span class="conf-tag ${getConfClass(conf)}">${pct}% conf</span>`;
    }

    // Format newlines as <br>
    const formattedText = text.replace(/\\n/g, '<br/>');

    msg.innerHTML = `
      <div class="avatar">${role === 'bot' ? 'AI' : 'U'}</div>
      <div class="msg-content">
        <div class="bubble">${formattedText}</div>
        <div class="meta">${metaHtml}</div>
      </div>
    `;
    
    // Smooth insertion
    requestAnimationFrame(() => {
      chat.appendChild(msg);
      scrollToBottom();
    });
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.id = 'typing';
    msg.className = 'message bot typing';
    msg.innerHTML = `
      <div class="avatar">AI</div>
      <div class="msg-content">
        <div class="bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    `;
    chat.appendChild(msg);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }

  function addHistoryItem(text) {
    const list = document.getElementById('history-list');
    const items = list.querySelectorAll('.history-item');
    items.forEach(i => i.classList.remove('active'));
    
    const item = document.createElement('div');
    item.className = 'history-item active';
    item.innerHTML = `
      <div class="h-title">${text}</div>
      <div class="h-time">${getTime()}</div>
    `;
    list.insertBefore(item, list.firstChild);
  }

  function newChat() {
    sessionId = generateSessionId();
    document.getElementById('session-display').textContent = sessionId.substring(0,6);
    document.getElementById('chat').innerHTML = `
      <div class="message bot">
        <div class="avatar">AI</div>
        <div class="msg-content">
          <div class="bubble">New conversation started. How can I assist you?</div>
          <div class="meta"><span>${getTime()}</span></div>
        </div>
      </div>
    `;
    
    // Clear history highlighting and add a new blank session or reset
    msgCount = 0;
    document.getElementById('msg-count').textContent = '0';
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    // UI Updates
    input.value = '';
    input.style.height = '40px'; 
    document.getElementById('send-btn').disabled = true;
    
    addMessage(text, 'user');
    
    if (msgCount === 0) {
      // First message in a session => update history summary
      addHistoryItem(text.substring(0, 30) + (text.length > 30 ? '...' : ''));
    }
    
    msgCount++;
    document.getElementById('msg-count').textContent = msgCount;
    showTyping();

    // API Call
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ question: text, session_id: sessionId })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.answer || 'Something went wrong processing your request.', 'bot', data.confidence);
    } catch (e) {
      hideTyping();
      addMessage('Error connecting to the server. Please ensure the backend is running on http://127.0.0.1:8000', 'bot', 0);
    }
    
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Auto-resize textarea
  const txt = document.getElementById('input');
  txt.addEventListener('input', function() {
    this.style.height = '40px'; // reset
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
